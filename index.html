<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text - Voice Convertor</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="shortcut icon" href="./public/images/favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="main">
      <h1>Text to Voice<span> Convertor</span></h1>
      <textarea placeholder="Write anything here...." id="textArea"></textarea>
      <div class="controls">
        <div class="custom-select-wrapper">
          <select></select>
          <span class="bi-chevron-down"></span>
        </div>
        <button id="button">
          <span class="bi bi-play-fill"></span> Listen
        </button>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
